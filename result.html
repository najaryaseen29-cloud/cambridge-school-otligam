<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Result</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #dfe9f3, #ffffff);
  text-align: center;
}

/* SEARCH BOX */
.search-box {
  margin-top: 20px;
}

input {
  padding: 10px;
  width: 220px;
  border-radius: 5px;
  border: 1px solid gray;
}

button {
  padding: 10px 15px;
  background: #004080;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* RESULT CARD */
.card {
  width: 750px;
  margin: 20px auto;
  background: white;
  border: 3px solid #004080;
  padding: 10px;
  display: none;
  border-radius: 10px;
  box-shadow: 0 0 10px gray;
}

/* HEADER */
.top {
  background: linear-gradient(to right, #ffcc00, #ff9900);
  padding: 10px;
  border-radius: 10px;
}

.top img {
  width: 60px;
}

/* DETAILS */
.details {
  text-align: left;
  margin-top: 10px;
  background: #f0f8ff;
  padding: 10px;
  border-radius: 5px;
}

.roll-highlight {
  background: #004080;
  color: white;
  padding: 5px 10px;
  border-radius: 5px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th {
  background: #004080;
  color: white;
}

td, th {
  border: 1px solid black;
  padding: 6px;
}

tr:nth-child(even) {
  background: #f2f2f2;
}

/* TOTAL BOX */
.total-box {
  margin-top: 10px;
  text-align: left;
  background: #e6ffe6;
  padding: 10px;
  border-radius: 5px;
}

.result {
  font-weight: bold;
  color: green;
}

/* BACK BUTTON */
.back-btn {
  margin-top: 10px;
  background: red;
}
</style>

</head>

<body>

<h2>🎓 Student Result Search</h2>

<div class="search-box">
<input type="text" id="search" placeholder="Enter Roll No OR Name">
<button onclick="getResult()">Search</button>
</div>

<div class="card" id="card">

<div class="top">
<center>
<img src="logo.png">
<h2>Cambridge School of Modern Education</h2>
<p>Otligam Beerwah</p>
<h3>Students Progress Report Card</h3>
</center>
</div>

<div class="details">
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Roll No:</b> <span class="roll-highlight" id="roll"></span></p>
<p><b>Class:</b> 7th</p>
</div>

<table>
<tr><th>Subject</th><th>Marks</th></tr>
<tr><td>English</td><td id="eng"></td></tr>
<tr><td>Urdu</td><td id="ur"></td></tr>
<tr><td>Math</td><td id="math"></td></tr>
<tr><td>Science</td><td id="sci"></td></tr>
<tr><td>Social Science</td><td id="sst"></td></tr>
</table>

<div class="total-box">
<p>Total: <span id="total"></span>/500</p>
<p>Percentage: <span id="per"></span>%</p>
<p>Grade: <span id="grade"></span></p>
<p class="result">Result: PASS ✔</p>
</div>

<button class="back-btn" onclick="goBack()">Back</button>

</div>

function getGrade(p){
  if(p>=90) return "A+";
  else if(p>=80) return "A";
  else if(p>=70) return "B";
  else if(p>=60) return "C";
  else return "Fail";
}

function getResult(){
  var input = document.getElementById("search").value.toLowerCase();
  var found=null, rollFound="";

  for(let roll in students){
    let s = students[roll];
    if(roll===input || s.name.toLowerCase().includes(input)){
      found=s;
      rollFound=roll;
      break;
    }
  }

  if(found){
    let total = found.eng+found.ur+found.math+found.sci+found.sst;
    let per = (total/500)*100;

    document.getElementById("card").style.display="block";

    document.getElementById("name").innerHTML=found.name;
    document.getElementById("roll").innerHTML=rollFound;
    document.getElementById("eng").innerHTML=found.eng;
    document.getElementById("ur").innerHTML=found.ur;
    document.getElementById("math").innerHTML=found.math;
    document.getElementById("sci").innerHTML=found.sci;
    document.getElementById("sst").innerHTML=found.sst;
    document.getElementById("total").innerHTML=total;
    document.getElementById("per").innerHTML=per.toFixed(2);
    document.getElementById("grade").innerHTML=getGrade(per);
  }
  else{
    alert("Result Not Found");
  }
}

function goBack(){
  document.getElementById("card").style.display="none";
  document.getElementById("search").value="";
}

</script>
