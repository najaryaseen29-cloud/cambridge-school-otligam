<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results</title>
</head>
<body style="text-align:center; font-family:Arial;">
    <h1>Student Results</h1>
    <p>Enter your roll number to view the result.</p>

    <!-- Form to take Roll Number -->
    <form id="result-form">
        <label for="roll-number">Roll Number:</label>
        <input type="text" id="roll-number" name="roll-number" required>
        <button type="submit">Submit</button>
    </form>
    
    <!-- Display Result -->
    <div id="result">
        <!-- Results will be shown here -->
    </div>

    <script>
        // When the form is submitted
        document.getElementById('result-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent the form from refreshing the page
            const rollNumber = document.getElementById('roll-number').value; // Get roll number from input field
            const resultDiv = document.getElementById('result'); // Div to display result

            // Fetch the results.json file from GitHub
            fetch('https://raw.githubusercontent.com/<your-username>/<repository-name>/main/results.json')
                .then(response => response.json())
                .then(data => {
                    // Check if the roll number exists in the data
                    if (data[rollNumber]) {
                        const student = data[rollNumber];
                        // Display the result for the student
                        resultDiv.innerHTML = `
                            <h2>Result for Roll Number: ${rollNumber}</h2>
                            <p>Name: ${student.name}</p>
                            <p>English: ${student.english}</p>
                            <p>Mathematics: ${student.mathematics}</p>
                            <p>Science: ${student.science}</p>
                            <p>Social Science: ${student.social_science}</p>
                            <p>Urdu: ${student.urdu}</p>
                            <p>Kashmiri: ${student.kashmiri}</p>
                        `;
                    } else {
                        // If no result is found for the entered roll number
                        resultDiv.innerHTML = `<p>No result found for Roll Number: ${rollNumber}</p>`;
                    }
                })
                .catch(error => {
                    // If there is an error fetching data
                    resultDiv.innerHTML = `<p>Error fetching data.</p>`;
                });
        });
    </script>
</body>
</html>
