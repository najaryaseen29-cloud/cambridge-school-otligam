<style>

  margin: 0;
}

header {
  background: #004080;
  color: white;
  padding: 15px;
}

  margin-top: 20px;
}

input {
  padding: 10px;
  width: 250px;
  border-radius: 5px;
  border: 1px solid gray;

button {
  padding: 10px 15px;
  background: #004080;
  color: white;

  border-radius: 5px;
  cursor: pointer;
}

.card {
  width: 500px;
  margin: 30px auto;
  background: white;
  border: 4px solid #004080;
  border-radius: 12px;
  padding: 20px;
  display: none;
  box-shadow: 0 0 10px gray;
}

  width: 70px;
}

.header h2 {

  margin: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th {
  background: #004080;
  color: white;
}

td, th {
  border: 1px solid black;
  padding: 8px;
}

.total {
  margin-top: 10px;
  font-weight: bold;
}

.print-btn {
  margin-top: 10px;
  background: green;
}
</style>
</head>

<body>

<header>
<h1>Cambridge School of Modern Education Otligam</h1>
<p>Search by Roll Number OR Name</p>
</header>

<div class="container">
<input type="text" id="search" placeholder="Enter Roll No or Name">
<button onclick="getResult()">Search</button>
</div>

<tr><td>Science</td><td id="sci"></td></tr>

</table>

<div class="total">
Total: <span id="total"></span>/500 <br>
Percentage: <span id="per"></span>% <br>
Grade: <span id="grade"></span>
</div>

<button class="print-btn" onclick="window.print()">Print</button>

</div>

function getGrade(p){
  if(p>=90) return "A+";
  else if(p>=80) return "A";
  else if(p>=70) return "B";
  else if(p>=60) return "C";
  else return "Fail";
}

function getResult(){
  var input = document.getElementById("search").value.toLowerCase();
  var found = null;
  var rollFound = "";

  for(let roll in students){
    let s = students[roll];
    if(roll === input || s.name.toLowerCase().includes(input)){
      found = s;
      rollFound = roll;
      break;
    }
  }

  if(found){
    var total = found.eng + found.ur + found.math + found.sci + found.sst;
    var per = (total/500)*100;

    document.getElementById("card").style.display = "block";

    document.getElementById("name").innerHTML = found.name;
    document.getElementById("rollno").innerHTML = rollFound;
    document.getElementById("eng").innerHTML = found.eng;
    document.getElementById("ur").innerHTML = found.ur;
    document.getElementById("math").innerHTML = found.math;
    document.getElementById("sci").innerHTML = found.sci;
    document.getElementById("sst").innerHTML = found.sst;
    document.getElementById("total").innerHTML = total;
    document.getElementById("per").innerHTML = per.toFixed(2);
    document.getElementById("grade").innerHTML = getGrade(per);

  } else {
    alert("Result Not Found");
  }
}

</script>
