<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Result</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #e6f2ff, #ffffff);
  text-align: center;
  margin: 0;
}

header {
  background: #004080;
  color: white;
  padding: 15px;
}

input {
  padding: 10px;
  width: 250px;
  border-radius: 5px;
}

button {
  padding: 10px;
  background: #004080;
  color: white;
  border: none;
  border-radius: 5px;
}

.card {
  width: 95%;
  max-width: 750px;
  margin: 20px auto;
  background: white;
  border: 4px solid #004080;
  border-radius: 10px;
  padding: 15px;
  display: none;
}

img {
  width: 100%;
  margin-bottom: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  border: 1px solid black;
  padding: 6px;
}

th {
  background: #004080;
  color: white;
}

.total {
  margin-top: 10px;
  font-weight: bold;
}

.print-btn {
  background: green;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
<h2>Cambridge School of Modern Education Otligam</h2>
<p>Search Result by Roll No or Name</p>
</header>

<br>

<input type="text" id="search" placeholder="Enter Roll No or Name">
<button onclick="getResult()">Search</button>

<tr><td>Urdu</td><td id="ur"></td></tr>

<tr><td>Science</td><td id="sci"></td></tr>
<tr><td>SST</td><td id="sst"></td></tr>
</table>

<div class="total">
Total: <span id="total"></span>/500 <br>
Percentage: <span id="per"></span>% <br>
Grade: <span id="grade"></span>

<button class="print-btn" onclick="window.print()">Print</button>

function grade(p){
if(p>=90) return "A+";
else if(p>=80) return "A";
else if(p>=70) return "B";
else if(p>=60) return "C";
else return "Fail";
}

function getResult(){
var input=document.getElementById("search").value.toLowerCase();
var data=null, roll="";

for(let r in students){
if(r==input || students[r].name.toLowerCase().includes(input)){
data=students[r]; roll=r; break;
}
}

if(data){
let total=data.eng+data.ur+data.math+data.sci+data.sst;
let per=(total/500)*100;

document.getElementById("card").style.display="block";

name.innerHTML=data.name;
roll.innerHTML=roll;
eng.innerHTML=data.eng;
ur.innerHTML=data.ur;
math.innerHTML=data.math;
sci.innerHTML=data.sci;
sst.innerHTML=data.sst;
total.innerHTML=total;
per.innerHTML=per.toFixed(2);
grade.innerHTML=grade(per);

}else{
alert("Result Not Found");
}
}
