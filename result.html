        body {

            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background-color: #004080;
            color: white;
            padding: 15px;
        }

        section {
            padding: 20px;
        }

        .btn {
            background-color: #004080;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }

        footer {
            background-color: #222;
            color: white;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        /* Result Section */
        .result-card {
            background-color: #e6f2ff;
            color: #003366;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            width: 250px;
            text-align: left;
            display: inline-block;
        }

        .result-card h3 {
            color: #003366;
        }

        .result-card p {
            color: #444;
        }

        .result-not-found {
            background-color: #ffcccc;
            padding: 15px;
            color: #cc0000;
            border-radius: 10px;
            margin-top: 20px;
        }

    </style>
</head>

    <p>Enter your roll number to view the result.</p>
</header>

        <label for="roll-number">Roll Number:</label>

        <button type="submit">Submit</button>
    </form>

    <div id="result">
        <!-- Results will be shown here -->
    </div>
</section>
