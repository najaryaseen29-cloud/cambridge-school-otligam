<!DOCTYPE html>
<html>
<head>
<title>Admission Form</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #004080, #66a3ff);
}

.container {
  width:900px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

.header {
  text-align:center;
}

.logo {
  width:120px;
}

h1,h2 {
  margin:5px;
  color:#004080;
}

input, select {
  width:100%;
  padding:5px;
  margin-top:5px;
}

.row {
  display:flex;
  gap:10px;
}

.row div {
  flex:1;
}

.photo-box {
  border:2px solid black;
  width:140px;
  height:160px;
  text-align:center;
  padding:5px;
}

button {
  background:#004080;
  color:white;
  padding:10px;
  border:none;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

button:hover {
  background:#00264d;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
  <!-- 🔹 Logo -->
  <img src="../logo.png" class="logo">
  <h1>CAMBRIDGE SCHOOL OF MODERN EDUCATION</h1>
  <h2>OTLIGAM BEERWAH</h2>
  <h2>ADMISSION FORM</h2>
</div>

<hr>

<div class="row">
  <div>
    <label>Admission No:</label>
    <input type="text">

    <label>Date:</label>
    <input type="date">
  </div>

  <!-- 🔹 Photo Upload -->
  <div class="photo-box">
    Upload Photo
    <input type="file" accept="image/*">
  </div>
</div>

<hr>

<label>Name of Student:</label>
<input type="text">

<label>Father's Name:</label>
<input type="text">

<label>Mother's Name:</label>
<input type="text">

<label>Last School Attended:</label>
<input type="text">

<div class="row">
  <div>
    <label>Last Grade:</label>
    <input type="text">
  </div>

  <div>
    <label>Grade Applied:</label>
    <input type="text">
  </div>

  <div>
    <label>Gender:</label>
    <select>
      <option>Male</option>
      <option>Female</option>
    </select>
  </div>
</div>

<label>Date of Birth:</label>
<input type="date">

<div class="row">
  <div>
    <label>Category:</label>
    <input type="text">
  </div>

  <div>
    <label>Blood Group:</label>
    <input type="text">
  </div>
</div>

<label>Address:</label>
<input type="text">

<div class="row">
  <div>
    <label>Phone:</label>
    <input type="text">
  </div>

  <div>
    <label>Email:</label>
    <input type="email">
  </div>
</div>

<hr>

<h3>Upload Documents</h3>

<label>Birth Certificate:</label>
<input type="file">

<label>Aadhar Card:</label>
<input type="file">

<label>Marks Sheet:</label>
<input type="file">

<label>Student Photo:</label>
<input type="file">

<hr>

<!-- ✅ Buttons -->
<button onclick="saveData()">💾 Save Data</button>

<button onclick="window.print()">🖨️ Print Form</button>

<br><br>

<!-- 🔹 Google Form Link -->
<a href="PASTE-YOUR-GOOGLE-FORM-LINK" target="_blank">
  <button type="button">📤 Submit Online</button>
</a>

<p id="msg" style="color:green; text-align:center;"></p>

<script>
function saveData(){
  document.getElementById("msg").innerHTML = "✅ Data Saved (Locally)";
}
</script>

<br>

<a href="../index.html">⬅ Back to Home</a>

</div>

</body>
</html>
