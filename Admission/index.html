<!DOCTYPE html>
<html>
<head>
<title>Admission Form</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #004080, #66a3ff);
}

.container {
  width:900px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

.header {
  text-align:center;
}

.logo {
  width:120px;
}

h1,h2 {
  margin:5px;
  color:#004080;
}

input, select {
  width:100%;
  padding:8px;
  margin:6px 0;
}

.row {
  display:flex;
  gap:10px;
}

.row div {
  flex:1;
}

button {
  background:#004080;
  color:white;
  padding:12px;
  border:none;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

button:hover {
  background:#00264d;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <img src="../logo.png" class="logo">
  <h1>CAMBRIDGE SCHOOL OF MODERN EDUCATION</h1>
  <h2>ADMISSION FORM</h2>
</div>

<hr>

<label>Name:</label>
<input type="text" id="name">

<label>Father Name:</label>
<input type="text" id="father">

<label>Mother Name:</label>
<input type="text" id="mother">

<label>Phone:</label>
<input type="text" id="phone">

<label>Email:</label>
<input type="email" id="email">

<label>Date of Birth:</label>
<input type="date" id="dob">

<label>Address:</label>
<input type="text" id="address">

<label>Class Applied:</label>
<input type="text" id="class">

<hr>

<button onclick="saveData()">📤 Submit Admission</button>

<p id="msg" style="color:green; text-align:center;"></p>

</div>

<!-- 🔥 Firebase Code -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6R64l64wRSyt01XV7NQmuKuhhFzdgppM",
  authDomain: "csme-school-website.firebaseapp.com",
  projectId: "csme-school-website",
  storageBucket: "csme-school-website.firebasestorage.app",
  messagingSenderId: "499247772756",
  appId: "1:499247772756:web:131af668d2ad7482d669c1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveData = async function () {

  let name = document.getElementById("name").value;
  let father = document.getElementById("father").value;
  let mother = document.getElementById("mother").value;
  let phone = document.getElementById("phone").value;
  let email = document.getElementById("email").value;
  let dob = document.getElementById("dob").value;
  let address = document.getElementById("address").value;
  let className = document.getElementById("class").value;

  if(name=="" || phone==""){
    document.getElementById("msg").innerHTML="❌ Fill required fields!";
    return;
  }

  try {
    await addDoc(collection(db, "admissions"), {
      name,
      father,
      mother,
      phone,
      email,
      dob,
      address,
      className,
      time: new Date()
    });

    document.getElementById("msg").innerHTML="✅ Admission Submitted Successfully!";
  } catch (e) {
    document.getElementById("msg").innerHTML="❌ Error: "+e;
  }

};

</script>

</body>
</html>
